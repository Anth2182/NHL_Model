name: Nightly NHL Update

on:
  schedule:
    - cron: '0 4 * * *'   # 11 PM EST (UTC-5) = 4 AM UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Force IPv4 (Supabase compatibility)
        run: sudo sed -i 's/^precedence ::ffff:0:0\/96  10$/precedence ::ffff:0:0\/96  100/' /etc/gai.conf

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape gamelogs
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python scripts/scrape_gamelogs.py

      - name: Scrape goalie stats
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python scripts/scrape_goalies.py

      - name: Train model
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python scripts/train_model.py

      - name: Commit updated model JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nhl_skellam_model.json
          git diff --cached --quiet || git commit -m "chore: nightly model retrain [skip ci]"
          git push
